# Docker Compose for FasonRat with auto-update
# Usage: docker-compose up -d

services:
  fasonrat:
    image: fahimahamed/fasonrat:latest
    container_name: fasonrat
    restart: unless-stopped
    ports:
      - "22533:22533"
    volumes:
      - fasonrat-data:/app/server/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:22533/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    # Pull latest image before starting
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

volumes:
  fasonrat-data:
    driver: local
